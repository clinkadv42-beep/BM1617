<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uang Masuk & Keluar BM 2016-2027</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Header -->
    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-blue-600 font-bold">BM</div>
            <h1 class="text-xl font-bold">Uang Masuk Dan Keluar BM 2016-2027</h1>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <!-- Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Total Uang Masuk</p>
                <h2 class="text-2xl font-bold text-green-600">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <p class="text-sm text-gray-500">Total Uang Keluar</p>
                <h2 class="text-2xl font-bold text-red-600">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-gray-500">Saldo Sisa</p>
                <h2 class="text-2xl font-bold text-blue-600">Rp 0</h2>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-2">
                <select class="border rounded p-2 text-sm">
                    <option>Semua Data</option>
                    <option>Mingguan</option>
                    <option>Bulanan</option>
                </select>
                <input type="date" class="border rounded p-2 text-sm">
                <input type="date" class="border rounded p-2 text-sm">
            </div>
            <div class="flex gap-2">
                <button class="bg-emerald-600 text-white px-4 py-2 rounded text-sm hover:bg-emerald-700">Export</button>
                <button onclick="bukaFormTambah()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Tambah Data</button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-lg shadow-sm overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-blue-500 text-white">
                    <tr>
                        <th class="p-3 text-sm">ID</th>
                        <th class="p-3 text-sm">Tanggal</th>
                        <th class="p-3 text-sm">Jenis</th>
                        <th class="p-3 text-sm">Kategori</th>
                        <th class="p-3 text-sm">Jumlah (Rp)</th>
                        <th class="p-3 text-sm">Metode</th>
                        <th class="p-3 text-sm">Deskripsi</th>
                        <th class="p-3 text-sm">File</th>
                        <th class="p-3 text-sm">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabel-data" class="divide-y text-gray-700">
                    <!-- Data akan muncul di sini -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        function loadTable() {
            google.script.run.withSuccessHandler(function(data) {
                let tbody = document.getElementById('tabel-data');
                tbody.innerHTML = '';
                data.forEach(function(row) {
                    tbody.innerHTML += `<tr>
                        <td class="p-3 text-sm">${row[0]}</td>
                        <td class="p-3 text-sm">${row[1]}</td>
                        <td class="p-3 text-sm">${row[2]}</td>
                        <td class="p-3 text-sm">${row[3]}</td>
                        <td class="p-3 text-sm">${row[4]}</td>
                        <td class="p-3 text-sm">${row[5]}</td>
                        <td class="p-3 text-sm">${row[6]}</td>
                        <td class="p-3 text-sm text-blue-600 underline cursor-pointer">Lihat File</td>
                        <td class="p-3 text-sm flex gap-3">
                            <button class="text-blue-600">Edit</button>
                            <button onclick="hapusData('${row[0]}')" class="text-red-600">Hapus</button>
                        </td>
                    </tr>`;
                });
            }).getDataFromSheet();
        }

        function bukaFormTambah() {
            let id = prompt("Masukkan ID:");
            if(!id) return;
            let tgl = prompt("Tanggal (YYYY-MM-DD):");
            let jns = prompt("Jenis:");
            let kat = prompt("Kategori:");
            let jml = prompt("Jumlah:");
            let met = prompt("Metode:");
            let des = prompt("Deskripsi:");

            google.script.run.withSuccessHandler(function() {
                alert("Data berhasil disimpan!");
                loadTable();
            }).tambahData([id, tgl, jns, kat, jml, met, des, "-"]);
        }

        function hapusData(id) {
            if(confirm("Yakin ingin menghapus ID " + id + "?")) {
                google.script.run.withSuccessHandler(function() {
                    loadTable();
                }).hapusData(id);
            }
        }

        window.onload = loadTable;
    </script>
</body>
</html>
